<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전통문양 인생네컷 | 국가유산 인터랙티브</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow-y:auto;background:#0a0604;font-family:'Noto Sans KR',sans-serif;color:#F5F0E8;min-height:100vh}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:999;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(10,6,4,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,168,76,0.2)}
.back-btn{color:#C9A84C;text-decoration:none;font-family:'Noto Serif KR',serif;font-size:1.1rem}
.page-title{color:#C9A84C;font-family:'Noto Serif KR',serif;font-size:1.2rem;letter-spacing:4px}
.main-area{display:flex;gap:30px;max-width:1200px;margin:80px auto 40px;padding:0 20px;justify-content:center;flex-wrap:wrap}
.camera-section{flex:0 0 480px}
.camera-box{width:480px;height:360px;background:#000;border-radius:12px;overflow:hidden;position:relative;
  border:2px solid rgba(201,168,76,0.2)}
.camera-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.camera-box .countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:6rem;color:#C9A84C;font-family:'Noto Serif KR',serif;text-shadow:0 0 30px rgba(201,168,76,0.5);
  display:none;animation:countPop .5s ease-out}
@keyframes countPop{from{transform:translate(-50%,-50%) scale(2);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.camera-box .flash{position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;opacity:0;
  pointer-events:none;transition:opacity .1s}
.controls-row{display:flex;gap:10px;margin-top:12px;justify-content:center}
.controls-row button{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);
  color:#C9A84C;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:'Noto Serif KR';
  font-size:0.9rem;transition:all .3s}
.controls-row button:hover{background:rgba(201,168,76,0.3);color:#fff}
.controls-row button.primary{background:linear-gradient(135deg,#C9A84C,#D4A843);color:#2B1810;font-weight:700}
.theme-selector{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.theme-btn{width:60px;height:60px;border-radius:8px;border:2px solid rgba(201,168,76,0.2);
  cursor:pointer;transition:all .3s;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(43,24,16,0.6);font-size:0.6rem;color:rgba(201,168,76,0.7)}
.theme-btn.active{border-color:#C9A84C;background:rgba(201,168,76,0.15)}
.theme-btn .theme-icon{font-size:1.5rem;margin-bottom:2px}
.result-section{flex:0 0 320px}
.photo-strip{width:320px;background:#F5F0E8;border-radius:8px;padding:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.photo-strip .strip-title{text-align:center;font-family:'Noto Serif KR',serif;color:#2B1810;
  font-size:1.1rem;margin-bottom:12px;letter-spacing:2px}
.photo-frame{width:280px;height:210px;margin:0 auto 10px;position:relative;overflow:hidden;
  border-radius:6px;background:#ddd}
.photo-frame img,.photo-frame canvas{width:100%;height:100%;object-fit:cover}
.photo-frame .frame-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
.strip-footer{text-align:center;font-family:'Noto Serif KR',serif;color:#8B4513;font-size:0.75rem;
  margin-top:8px;padding-top:8px;border-top:1px solid rgba(139,69,19,0.2)}
.photo-number{position:absolute;top:4px;left:8px;color:rgba(201,168,76,0.6);font-size:0.7rem;
  font-family:'Noto Serif KR',serif}
.status-text{text-align:center;margin-top:12px;color:rgba(201,168,76,0.6);font-size:0.85rem}
.hidden-canvas{display:none}
</style>
</head>
<body>
<nav class="top-nav">
  <a href="../index.html" class="back-btn">← 메인</a>
  <div class="page-title">전통문양 인생네컷</div>
  <div style="width:60px"></div>
</nav>

<div class="main-area">
  <div class="camera-section">
    <div class="camera-box" id="cameraBox">
      <video id="webcam" autoplay playsinline muted></video>
      <div class="countdown" id="countdown"></div>
      <div class="flash" id="flash"></div>
    </div>
    <div class="controls-row">
      <button class="primary" onclick="startCapture()">📸 촬영 시작</button>
      <button onclick="resetPhotos()">🔄 다시 찍기</button>
      <button onclick="downloadStrip()">💾 저장하기</button>
    </div>
    <div class="theme-selector" id="themeSelector">
      <div class="theme-btn active" data-theme="dancheong" onclick="selectTheme(this)">
        <div class="theme-icon">🏛️</div>단청
      </div>
      <div class="theme-btn" data-theme="lotus" onclick="selectTheme(this)">
        <div class="theme-icon">🪷</div>연꽃
      </div>
      <div class="theme-btn" data-theme="cloud" onclick="selectTheme(this)">
        <div class="theme-icon">☁️</div>구름
      </div>
      <div class="theme-btn" data-theme="wave" onclick="selectTheme(this)">
        <div class="theme-icon">🌊</div>파도
      </div>
      <div class="theme-btn" data-theme="bamboo" onclick="selectTheme(this)">
        <div class="theme-icon">🎋</div>대나무
      </div>
    </div>
    <div class="status-text" id="statusText">테마를 선택하고 촬영을 시작하세요</div>
  </div>
  <div class="result-section">
    <div class="photo-strip" id="photoStrip">
      <div class="strip-title">전통문양 인생네컷</div>
      <div class="photo-frame" id="frame0"><div class="photo-number">① </div></div>
      <div class="photo-frame" id="frame1"><div class="photo-number">②</div></div>
      <div class="photo-frame" id="frame2"><div class="photo-number">③</div></div>
      <div class="photo-frame" id="frame3"><div class="photo-number">④</div></div>
      <div class="strip-footer" id="stripFooter"></div>
    </div>
  </div>
</div>

<canvas class="hidden-canvas" id="captureCanvas" width="480" height="360"></canvas>
<canvas class="hidden-canvas" id="exportCanvas" width="640" height="1800"></canvas>

<script>
const video=document.getElementById('webcam');
const captureCanvas=document.getElementById('captureCanvas');
const captureCtx=captureCanvas.getContext('2d');
let photos=[];
let currentTheme='dancheong';
let capturing=false;

// Theme frame drawing functions
const THEMES={
  dancheong:{
    name:'단청',
    draw:(ctx,w,h)=>{
      const colors=['#C73E3A','#2E5C8A','#3E7A4C','#D4A843','#F5F0E8'];
      const bw=8;
      for(let i=0;i<5;i++){
        ctx.strokeStyle=colors[i];ctx.lineWidth=bw;
        ctx.strokeRect(i*bw+bw/2,i*bw+bw/2,w-i*bw*2-bw,h-i*bw*2-bw);
      }
      // Corner flowers
      [[20,20],[w-20,20],[20,h-20],[w-20,h-20]].forEach(([cx,cy])=>{
        for(let j=0;j<6;j++){
          ctx.save();ctx.translate(cx,cy);ctx.rotate(j*Math.PI/3);
          ctx.beginPath();ctx.ellipse(10,0,8,4,0,0,Math.PI*2);
          ctx.fillStyle='#D4A843';ctx.fill();ctx.restore();
        }
        ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle='#C73E3A';ctx.fill();
      });
    }
  },
  lotus:{
    name:'연꽃',
    draw:(ctx,w,h)=>{
      ctx.strokeStyle='rgba(199,62,58,0.6)';ctx.lineWidth=3;ctx.strokeRect(5,5,w-10,h-10);
      [[w/2,10],[w/2,h-10],[10,h/2],[w-10,h/2]].forEach(([cx,cy])=>{
        for(let i=0;i<8;i++){
          ctx.save();ctx.translate(cx,cy);ctx.rotate(i*Math.PI/4);
          ctx.beginPath();ctx.ellipse(12,0,10,5,0,0,Math.PI*2);
          ctx.fillStyle='rgba(255,182,193,0.6)';ctx.fill();
          ctx.strokeStyle='rgba(199,62,58,0.4)';ctx.stroke();ctx.restore();
        }
      });
    }
  },
  cloud:{
    name:'구름',
    draw:(ctx,w,h)=>{
      ctx.strokeStyle='rgba(201,168,76,0.4)';ctx.lineWidth=2;ctx.strokeRect(3,3,w-6,h-6);
      const drawCloud=(x,y,s)=>{
        ctx.fillStyle='rgba(201,168,76,0.15)';
        ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.arc(x+s*0.8,y-s*0.3,s*0.7,0,Math.PI*2);
        ctx.arc(x+s*1.5,y,s*0.8,0,Math.PI*2);ctx.fill();
      };
      drawCloud(30,20,15);drawCloud(w-60,15,12);drawCloud(20,h-25,10);drawCloud(w-40,h-20,14);
    }
  },
  wave:{
    name:'파도',
    draw:(ctx,w,h)=>{
      ctx.strokeStyle='rgba(46,92,138,0.5)';ctx.lineWidth=2;
      for(let y of[8,h-8]){
        ctx.beginPath();for(let x=0;x<w;x+=3){ctx.lineTo(x,y+Math.sin(x*0.05)*4);}ctx.stroke();
      }
      for(let x of[8,w-8]){
        ctx.beginPath();for(let y=0;y<h;y+=3){ctx.lineTo(x+Math.sin(y*0.05)*4,y);}ctx.stroke();
      }
    }
  },
  bamboo:{
    name:'대나무',
    draw:(ctx,w,h)=>{
      ctx.strokeStyle='rgba(62,122,76,0.4)';ctx.lineWidth=1.5;ctx.strokeRect(4,4,w-8,h-8);
      const drawBamboo=(x,y,h2)=>{
        ctx.strokeStyle='rgba(62,122,76,0.5)';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-h2);ctx.stroke();
        for(let i=1;i<h2/20;i++){
          ctx.beginPath();ctx.moveTo(x-1,y-i*20);ctx.lineTo(x+1,y-i*20);ctx.lineWidth=1;ctx.stroke();
        }
        ctx.fillStyle='rgba(62,122,76,0.3)';
        ctx.beginPath();ctx.ellipse(x+10,y-h2+5,12,4,0.3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(x-8,y-h2+15,10,3,-0.3,0,Math.PI*2);ctx.fill();
      };
      drawBamboo(15,h,h*0.6);drawBamboo(w-15,h,h*0.7);
    }
  }
};

function selectTheme(el){
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentTheme=el.dataset.theme;
  // Redraw existing photos with new theme
  photos.forEach((p,i)=>renderFrame(i));
}

async function startCapture(){
  if(capturing)return;
  capturing=true;
  photos=[];
  for(let i=0;i<4;i++){
    document.getElementById('statusText').textContent=`${i+1}/4 촬영 준비 중...`;
    for(let c=3;c>0;c--){
      const cd=document.getElementById('countdown');
      cd.style.display='block';cd.textContent=c;
      await new Promise(r=>setTimeout(r,1000));
    }
    document.getElementById('countdown').style.display='none';
    // Flash
    const flash=document.getElementById('flash');
    flash.style.opacity='0.8';setTimeout(()=>flash.style.opacity='0',150);
    // Capture
    captureCtx.save();captureCtx.translate(captureCanvas.width,0);captureCtx.scale(-1,1);
    captureCtx.drawImage(video,0,0,captureCanvas.width,captureCanvas.height);
    captureCtx.restore();
    const imgData=captureCanvas.toDataURL('image/png');
    photos.push(imgData);
    renderFrame(i);
    document.getElementById('statusText').textContent=`${i+1}/4 촬영 완료!`;
    if(i<3)await new Promise(r=>setTimeout(r,1000));
  }
  capturing=false;
  document.getElementById('statusText').textContent='촬영 완료! 저장하기를 눌러 다운로드하세요';
  const now=new Date();
  document.getElementById('stripFooter').textContent=
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 • 국가유산 인터랙티브`;
}

function renderFrame(idx){
  const frame=document.getElementById('frame'+idx);
  frame.innerHTML=`<div class="photo-number">${['①','②','③','④'][idx]}</div>`;
  if(photos[idx]){
    const img=document.createElement('img');img.src=photos[idx];frame.appendChild(img);
    // Draw frame overlay with canvas
    const oc=document.createElement('canvas');oc.width=280;oc.height=210;oc.className='frame-overlay';
    const octx=oc.getContext('2d');
    if(THEMES[currentTheme])THEMES[currentTheme].draw(octx,280,210);
    frame.appendChild(oc);
  }
}

function resetPhotos(){
  photos=[];
  for(let i=0;i<4;i++){
    const frame=document.getElementById('frame'+i);
    frame.innerHTML=`<div class="photo-number">${['①','②','③','④'][i]}</div>`;
  }
  document.getElementById('stripFooter').textContent='';
  document.getElementById('statusText').textContent='테마를 선택하고 촬영을 시작하세요';
}

function downloadStrip(){
  if(photos.length<4){alert('4장을 모두 촬영해주세요!');return;}
  const ec=document.getElementById('exportCanvas');const ectx=ec.getContext('2d');
  ec.width=640;ec.height=1800;
  // Background
  ectx.fillStyle='#F5F0E8';ectx.fillRect(0,0,640,1800);
  // Title
  ectx.fillStyle='#2B1810';ectx.font='bold 28px "Noto Serif KR",serif';ectx.textAlign='center';
  ectx.fillText('전통문양 인생네컷',320,50);
  // Decorative line
  ectx.strokeStyle='#C9A84C';ectx.lineWidth=2;
  ectx.beginPath();ectx.moveTo(100,65);ectx.lineTo(540,65);ectx.stroke();
  // Photos
  let loaded=0;
  photos.forEach((src,i)=>{
    const img=new Image();
    img.onload=()=>{
      const y=80+i*400;
      ectx.drawImage(img,40,y,560,380);
      // Frame overlay
      if(THEMES[currentTheme])THEMES[currentTheme].draw(ectx.constructor===CanvasRenderingContext2D.constructor?ectx:ectx,560,380);
      // Actually draw frame at correct position
      ectx.save();ectx.translate(40,y);
      const tc=document.createElement('canvas');tc.width=560;tc.height=380;const tctx=tc.getContext('2d');
      THEMES[currentTheme].draw(tctx,560,380);
      ectx.drawImage(tc,0,0);
      ectx.restore();
      loaded++;
      if(loaded===4){
        // Footer
        const now=new Date();
        ectx.fillStyle='#8B4513';ectx.font='14px "Noto Serif KR",serif';
        ectx.fillText(`${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} | 국가유산 인터랙티브`,320,1730);
        // Download
        const link=document.createElement('a');link.download='heritage-photobooth.png';
        link.href=ec.toDataURL('image/png');link.click();
      }
    };
    img.src=src;
  });
}

// Init webcam
navigator.mediaDevices.getUserMedia({video:{width:640,height:480}}).then(stream=>{
  video.srcObject=stream;
}).catch(e=>console.error(e));
</script>
</body>
</html>
