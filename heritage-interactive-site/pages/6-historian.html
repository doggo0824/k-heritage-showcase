<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사관 LLM | 국가유산 인터랙티브</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2B1810;font-family:'Noto Sans KR',sans-serif;color:#F5F0E8;min-height:100vh;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='60' height='60' fill='%232B1810'/%3E%3Cpath d='M0 30h60M30 0v60' stroke='%23352015' stroke-width='0.5'/%3E%3C/svg%3E")}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:999;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(43,24,16,0.95);backdrop-filter:blur(10px);border-bottom:2px solid rgba(201,168,76,0.3)}
.back-btn{color:#C9A84C;text-decoration:none;font-family:'Noto Serif KR',serif;font-size:1.1rem}
.page-title{color:#C9A84C;font-family:'Noto Serif KR',serif;font-size:1.2rem;letter-spacing:4px}
.main-layout{display:flex;margin-top:60px;height:calc(100vh - 60px)}
.sidebar{width:300px;background:rgba(20,10,5,0.95);border-right:1px solid rgba(201,168,76,0.15);overflow-y:auto;padding:16px;flex-shrink:0}
.sidebar h3{color:#C9A84C;font-family:'Noto Serif KR',serif;font-size:1rem;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2);letter-spacing:2px}
.record-card{background:rgba(245,240,232,0.04);border:1px solid rgba(201,168,76,0.1);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .3s}
.record-card:hover{border-color:rgba(201,168,76,0.3);background:rgba(201,168,76,0.05)}
.record-card .date{color:#C9A84C;font-family:'Nanum Myeongjo',serif;font-size:.75rem}
.record-card .preview{color:rgba(245,240,232,0.6);font-size:.8rem;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.content-area{flex:1;display:flex;flex-direction:column}
.sillok-scroll{flex:1;overflow-y:auto;padding:40px;display:flex;justify-content:center}
.sillok-page{max-width:700px;width:100%;background:linear-gradient(135deg,#F5F0E8,#EDE5D5);border-radius:4px;padding:50px 60px;min-height:500px;position:relative;box-shadow:4px 4px 20px rgba(0,0,0,0.3)}
.sillok-page::before{content:'';position:absolute;top:20px;left:40px;right:40px;height:2px;background:linear-gradient(90deg,transparent,#C73E3A,transparent)}
.sillok-page::after{content:'';position:absolute;bottom:20px;left:40px;right:40px;height:2px;background:linear-gradient(90deg,transparent,#C73E3A,transparent)}
.sillok-header{text-align:center;margin-bottom:30px}
.sillok-title{font-family:'Nanum Myeongjo',serif;color:#2B1810;font-size:1.6rem;font-weight:700;letter-spacing:6px;margin-bottom:8px}
.sillok-date{font-family:'Nanum Myeongjo',serif;color:#8B4513;font-size:.9rem;letter-spacing:2px}
.sillok-weather{font-family:'Nanum Myeongjo',serif;color:#5C3A21;font-size:.85rem;margin-top:4px}
.sillok-body{font-family:'Nanum Myeongjo',serif;color:#2B1810;font-size:1rem;line-height:2.2;text-align:justify;letter-spacing:1px}
.sillok-body p{text-indent:2em;margin-bottom:16px}
.sillok-seal{text-align:center;margin-top:30px;opacity:.3}
.chat-section{background:rgba(20,10,5,0.95);border-top:1px solid rgba(201,168,76,0.2);padding:16px 24px}
.chat-row{display:flex;gap:12px;max-width:700px;margin:0 auto;align-items:center}
.chat-input{flex:1;background:rgba(245,240,232,0.08);border:1px solid rgba(201,168,76,0.2);color:#F5F0E8;padding:12px 16px;border-radius:8px;font-family:'Noto Sans KR';font-size:.95rem;outline:none;resize:none}
.chat-input:focus{border-color:rgba(201,168,76,0.5)}
.chat-input::placeholder{color:rgba(245,240,232,0.3)}
.send-btn{background:linear-gradient(135deg,#C9A84C,#D4A843);color:#2B1810;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-family:'Noto Serif KR';font-weight:700;font-size:.95rem;transition:all .3s;white-space:nowrap}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.chat-messages{max-width:700px;margin:0 auto 12px;max-height:120px;overflow-y:auto}
.msg{padding:6px 12px;border-radius:6px;margin-bottom:4px;font-size:.85rem}
.msg.user{background:rgba(201,168,76,0.1);text-align:right}
.msg.ai{background:rgba(46,92,138,0.1)}
/* API 키 패널 */
.api-panel{position:fixed;top:70px;right:20px;z-index:10;background:rgba(20,10,5,0.97);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:20px;width:320px;backdrop-filter:blur(10px)}
.api-panel h4{color:#C9A84C;font-family:'Noto Serif KR',serif;font-size:.95rem;margin-bottom:12px}
.api-panel label{color:rgba(245,240,232,0.6);font-size:.75rem;display:block;margin-bottom:4px}
.api-panel input{width:100%;background:rgba(245,240,232,0.06);border:1px solid rgba(201,168,76,0.15);color:#F5F0E8;padding:8px 10px;border-radius:6px;font-size:.85rem;margin-bottom:8px;font-family:monospace}
.api-panel .btn-row{display:flex;gap:8px;margin-bottom:12px}
.api-panel button{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.25);color:#C9A84C;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .3s;flex:1}
.api-panel button:hover{background:rgba(201,168,76,0.3)}
.api-panel button.danger{background:rgba(199,62,58,0.15);border-color:rgba(199,62,58,0.3);color:#FF9999}
.api-status{padding:8px 10px;border-radius:6px;font-size:.75rem;margin-bottom:10px}
.api-status.connected{background:rgba(62,122,76,0.15);color:#7FFF7F;border:1px solid rgba(62,122,76,0.3)}
.api-status.disconnected{background:rgba(199,62,58,0.1);color:#FF9999;border:1px solid rgba(199,62,58,0.2)}
.security-note{background:rgba(46,92,138,0.1);border:1px solid rgba(46,92,138,0.2);border-radius:6px;padding:10px;font-size:.7rem;color:rgba(245,240,232,0.5);line-height:1.5}
.security-note b{color:#C9A84C}
.toggle-api{position:fixed;top:70px;right:20px;z-index:11;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:#C9A84C;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.8rem}
</style>
</head>
<body>
<nav class="top-nav">
  <a href="../index.html" class="back-btn">← 메인</a>
  <div class="page-title">사관 LLM — 조선왕조실록</div>
  <div style="width:60px"></div>
</nav>

<button class="toggle-api" onclick="toggleApiPanel()">🔑 API 설정</button>

<div class="api-panel" id="apiPanel" style="display:none">
  <h4>🔑 API 키 설정</h4>
  <div class="api-status disconnected" id="apiStatus">⚠ API 키 미설정 — 기본 템플릿 모드</div>
  <label>OpenAI API Key</label>
  <input type="password" id="apiKeyInput" placeholder="sk-proj-..." autocomplete="off">
  <div class="btn-row">
    <button onclick="saveApiKey()">💾 저장</button>
    <button onclick="testApiKey()">🔍 테스트</button>
    <button class="danger" onclick="clearApiKey()">🗑️ 삭제</button>
  </div>
  <div class="security-note">
    <b>🔒 보안 안내</b><br>
    • API 키는 <b>브라우저 sessionStorage</b>에만 저장됩니다<br>
    • 탭을 닫으면 키가 자동 삭제됩니다<br>
    • 서버로 전송되지 않으며 GitHub에 업로드되지 않습니다<br>
    • <b>프로덕션 배포 시</b> 반드시 프록시 서버를 사용하세요<br>
    (아래 README의 보안 가이드 참조)
  </div>
</div>

<div class="main-layout">
  <div class="sidebar" id="sidebar">
    <h3>📜 이전 기록</h3>
    <div id="recordsList"></div>
  </div>
  <div class="content-area">
    <div class="sillok-scroll">
      <div class="sillok-page" id="sillokPage">
        <div class="sillok-header">
          <div class="sillok-title" id="sillokTitle">실록 생성 대기</div>
          <div class="sillok-date" id="sillokDate"></div>
          <div class="sillok-weather" id="sillokWeather"></div>
        </div>
        <div class="sillok-body" id="sillokBody">
          <p style="text-align:center;color:#8B4513;opacity:.5">아래 입력창에 오늘 있었던 일을 이야기해주세요.<br>사관이 실록의 형식으로 기록해 드립니다.</p>
        </div>
        <div class="sillok-seal">⊙</div>
      </div>
    </div>
    <div class="chat-section">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-row">
        <textarea class="chat-input" id="chatInput" rows="2" placeholder="오늘 있었던 일을 이야기해주세요..."></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">기록하라</button>
      </div>
    </div>
  </div>
</div>

<script>
// ====== API 키: sessionStorage만 사용 (탭 닫으면 삭제) ======
let apiKey=sessionStorage.getItem('heritage-api-key')||'';

function toggleApiPanel(){
  const p=document.getElementById('apiPanel');
  p.style.display=p.style.display==='none'?'block':'none';
}

function updateApiStatus(){
  const el=document.getElementById('apiStatus');
  if(apiKey){el.className='api-status connected';el.textContent='✓ API 키 설정됨 (세션 전용 — 탭 닫으면 삭제)';}
  else{el.className='api-status disconnected';el.textContent='⚠ API 키 미설정 — 기본 템플릿 모드';}
}

function saveApiKey(){
  const v=document.getElementById('apiKeyInput').value.trim();
  if(!v){alert('API 키를 입력하세요');return}
  if(!v.startsWith('sk-')){alert('유효한 OpenAI API 키 형식이 아닙니다 (sk-로 시작)');return}
  apiKey=v;
  sessionStorage.setItem('heritage-api-key',apiKey);
  document.getElementById('apiKeyInput').value='';
  updateApiStatus();
  alert('저장되었습니다! (이 탭에서만 유효합니다)');
}

async function testApiKey(){
  if(!apiKey){alert('먼저 API 키를 저장하세요');return}
  try{
    const r=await fetch('https://api.openai.com/v1/models',{headers:{'Authorization':'Bearer '+apiKey}});
    if(r.ok)alert('✅ API 키가 유효합니다!');
    else{const d=await r.json();alert('❌ 오류: '+(d.error?.message||r.status))}
  }catch(e){alert('❌ 연결 실패: '+e.message)}
}

function clearApiKey(){
  apiKey='';sessionStorage.removeItem('heritage-api-key');
  document.getElementById('apiKeyInput').value='';
  updateApiStatus();alert('API 키가 삭제되었습니다');
}

updateApiStatus();

// ====== 실록 로직 ======
const conversationHistory=[];
let records=JSON.parse(localStorage.getItem('heritage-sillok-records')||'[]');

function renderRecords(){
  const list=document.getElementById('recordsList');list.innerHTML='';
  records.slice().reverse().forEach(r=>{
    const card=document.createElement('div');card.className='record-card';
    card.innerHTML=`<div class="date">${r.date}</div><div class="preview">${r.preview}</div>`;
    card.onclick=()=>{document.getElementById('sillokTitle').textContent=r.title||'실록';document.getElementById('sillokDate').textContent=r.date;document.getElementById('sillokWeather').textContent=r.weather||'';document.getElementById('sillokBody').innerHTML=r.body};
    list.appendChild(card);
  });
}

function getKoreanDate(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth()+1,d=now.getDate(),h=now.getHours();
  const tn=['자시','축시','인시','묘시','진시','사시','오시','미시','신시','유시','술시','해시'];
  return{display:`${y}년 ${m}월 ${d}일 ${tn[Math.floor(h/2)%12]}`,year:y,month:m,day:d};
}

function getRandomWeather(){return['맑음 ☀️','흐림 ☁️','비 🌧️','눈 ❄️','바람 💨','안개 🌫️'][Math.floor(Math.random()*6)]}

async function convertToSillok(userText){
  const di=getKoreanDate(),w=getRandomWeather();
  if(apiKey){
    try{
      const resp=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
        body:JSON.stringify({model:'gpt-4o-mini',messages:[
          {role:'system',content:`당신은 조선시대 사관입니다. 사용자가 전하는 이야기를 조선왕조실록의 문체와 형식으로 변환해주세요.
규칙: 1.고전 한국어 문체(하였다,~하니,~하더라) 2.실록 기사체 형식 3.[사신왈(史臣曰)] 논평 추가 4.날짜:${di.display},날씨:${w} 5.HTML <p>태그로 단락 구분 6.첫 문장에 날씨 언급`},
          {role:'user',content:userText}
        ],max_tokens:1000,temperature:0.8})
      });
      const data=await resp.json();
      if(data.error)throw new Error(data.error.message);
      return{title:`실록 — ${di.year}년 ${di.month}월 ${di.day}일`,date:di.display,weather:`날씨: ${w}`,body:data.choices[0].message.content};
    }catch(e){console.error(e);return fallbackConvert(userText,di,w)}
  }
  return fallbackConvert(userText,di,w);
}

function fallbackConvert(text,di,w){
  const sentences=text.split(/[.!?]+/).filter(s=>s.trim());
  let body=`<p>${di.display}, ${w}.</p><p>`;
  sentences.forEach(s=>body+=s.trim()+'하였다. ');
  body+='</p><p>[사신왈(史臣曰)] 이 일을 기록하노니, 후세에 전하여 귀감으로 삼을지어다.</p>';
  return{title:`실록 — ${di.year}년 ${di.month}월 ${di.day}일`,date:di.display,weather:`날씨: ${w}`,body};
}

async function sendMessage(){
  const input=document.getElementById('chatInput'),text=input.value.trim();
  if(!text)return;input.value='';
  document.getElementById('sendBtn').disabled=true;
  const msgs=document.getElementById('chatMessages');
  msgs.innerHTML+=`<div class="msg user">${text}</div><div class="msg ai">📝 사관이 기록 중...</div>`;
  msgs.scrollTop=msgs.scrollHeight;
  conversationHistory.push(text);
  const result=await convertToSillok(conversationHistory.join('\n'));
  document.getElementById('sillokTitle').textContent=result.title;
  document.getElementById('sillokDate').textContent=result.date;
  document.getElementById('sillokWeather').textContent=result.weather;
  document.getElementById('sillokBody').innerHTML=result.body;
  records.push({...result,preview:text.substring(0,50),timestamp:Date.now()});
  localStorage.setItem('heritage-sillok-records',JSON.stringify(records));
  renderRecords();msgs.lastChild.innerHTML='✅ 기록 완료';
  document.getElementById('sendBtn').disabled=false;
}

document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
renderRecords();
</script>
</body>
</html>
