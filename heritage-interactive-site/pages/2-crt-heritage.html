<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국가유산 CRT | 국가유산 인터랙티브</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Noto Sans KR',sans-serif}
#webcamVideo{position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;transform:scaleX(-1);display:none}
#mainCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh}
#threeCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:5}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;justify-content:space-between;align-items:center;padding:12px 24px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,168,76,0.2)}
.back-btn{color:#C9A84C;text-decoration:none;font-family:'Noto Serif KR',serif;font-size:1.1rem}
.page-title{color:#C9A84C;font-family:'Noto Serif KR',serif;font-size:1.2rem;letter-spacing:4px}
.status-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:16px;background:rgba(0,0,0,0.7);padding:10px 20px;border-radius:20px;
  border:1px solid rgba(201,168,76,0.2);backdrop-filter:blur(10px)}
.status-item{color:rgba(245,240,232,0.7);font-size:0.8rem;display:flex;align-items:center;gap:6px}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.on{background:#7FFF7F;box-shadow:0 0 6px #7FFF7F}
.status-dot.off{background:#FF6666}
.model-info{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10;
  color:#C9A84C;font-family:'Noto Serif KR',serif;font-size:1.1rem;opacity:0;transition:opacity .5s;
  text-shadow:0 0 15px rgba(201,168,76,0.5);background:rgba(0,0,0,0.5);padding:8px 20px;border-radius:8px}
.model-info.show{opacity:1}
.crt-controls{position:fixed;top:70px;right:20px;z-index:10;background:rgba(0,0,0,0.7);
  border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:16px;backdrop-filter:blur(10px)}
.crt-controls label{color:rgba(245,240,232,0.7);font-size:0.75rem;display:block;margin-bottom:4px}
.crt-controls input[type=range]{width:120px;accent-color:#C9A84C}
</style>
</head>
<body>
<nav class="top-nav">
  <a href="../index.html" class="back-btn">← 메인</a>
  <div class="page-title">국가유산 CRT</div>
  <div style="width:60px"></div>
</nav>

<video id="webcamVideo" autoplay playsinline muted></video>
<canvas id="mainCanvas"></canvas>
<div id="threeCanvas"></div>

<div class="crt-controls">
  <label>CRT 강도</label>
  <input type="range" id="crtIntensity" min="0" max="100" value="70">
  <label style="margin-top:8px">스캔라인</label>
  <input type="range" id="scanlineIntensity" min="0" max="100" value="50">
  <label style="margin-top:8px">색수차</label>
  <input type="range" id="chromatic" min="0" max="20" value="8">
</div>

<div class="status-bar">
  <div class="status-item"><div class="status-dot off" id="faceDot"></div>얼굴</div>
  <div class="status-item"><div class="status-dot off" id="handDot"></div>손</div>
  <div class="status-item"><div class="status-dot off" id="modelDot"></div>3D 모델</div>
</div>
<div class="model-info" id="modelInfo">🏛️ 손을 펼쳐 국가유산을 소환하세요</div>

<script>
const video=document.getElementById('webcamVideo');
const canvas=document.getElementById('mainCanvas');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let faceRegions=[];
let handRegions=[];
let palmOpen=false;
let palmPos={x:0.5,y:0.5};
let modelVisible=false;

// CRT Effect params
const crtParams={intensity:0.7,scanlines:0.5,chromatic:8};
document.getElementById('crtIntensity').oninput=e=>{crtParams.intensity=e.target.value/100};
document.getElementById('scanlineIntensity').oninput=e=>{crtParams.scanlines=e.target.value/100};
document.getElementById('chromatic').oninput=e=>{crtParams.chromatic=parseInt(e.target.value)};

// ===== Three.js Scene =====
const scene=new THREE.Scene();
const camera3d=new THREE.PerspectiveCamera(50,W/H,0.1,1000);
camera3d.position.set(0,0,5);
const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(W,H);renderer.setClearColor(0x000000,0);
document.getElementById('threeCanvas').appendChild(renderer.domElement);
renderer.domElement.style.position='fixed';renderer.domElement.style.top='0';renderer.domElement.style.left='0';

// Lighting
const ambLight=new THREE.AmbientLight(0xC9A84C,0.6);scene.add(ambLight);
const dirLight=new THREE.DirectionalLight(0xFFFFFF,0.8);dirLight.position.set(2,3,5);scene.add(dirLight);
const pointLight=new THREE.PointLight(0xC9A84C,0.5,10);pointLight.position.set(0,2,3);scene.add(pointLight);

// Default 3D model (pagoda-like geometry)
let heritageModel;
function createDefaultModel(){
  const group=new THREE.Group();
  const mat1=new THREE.MeshPhongMaterial({color:0x8B4513,shininess:60});
  const mat2=new THREE.MeshPhongMaterial({color:0xC73E3A,shininess:80});
  const mat3=new THREE.MeshPhongMaterial({color:0xC9A84C,shininess:100});
  // Base
  group.add(new THREE.Mesh(new THREE.BoxGeometry(2,0.3,2),mat1));
  // Tiers
  for(let i=0;i<4;i++){
    const s=1.8-i*0.35;const y=0.3+i*0.6;
    const tier=new THREE.Mesh(new THREE.BoxGeometry(s,0.15,s),mat2);tier.position.y=y;group.add(tier);
    const roof=new THREE.Mesh(new THREE.ConeGeometry(s*0.7,0.2,4),mat3);roof.position.y=y+0.2;roof.rotation.y=Math.PI/4;group.add(roof);
  }
  // Spire
  const spire=new THREE.Mesh(new THREE.ConeGeometry(0.15,0.8,8),mat3);spire.position.y=3;group.add(spire);
  group.scale.set(0.5,0.5,0.5);
  return group;
}
heritageModel=createDefaultModel();
heritageModel.visible=false;
scene.add(heritageModel);

// Model file loading support
const fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='.glb,.gltf';
fileInput.style.display='none';document.body.appendChild(fileInput);
fileInput.onchange=e=>{
  const file=e.target.files[0];if(!file)return;
  const url=URL.createObjectURL(file);
  const loader=new THREE.GLTFLoader();
  loader.load(url,gltf=>{
    scene.remove(heritageModel);
    heritageModel=gltf.scene;
    heritageModel.scale.set(0.5,0.5,0.5);
    heritageModel.visible=false;
    scene.add(heritageModel);
  });
};

// ===== CRT Effect on Canvas =====
function applyCRTToRegion(imageData,regions,intensity){
  const d=imageData.data;const w=imageData.width;const h=imageData.height;
  const chr=crtParams.chromatic;
  regions.forEach(r=>{
    const x1=Math.max(0,Math.floor(r.x*w));
    const y1=Math.max(0,Math.floor(r.y*h));
    const x2=Math.min(w,Math.floor((r.x+r.w)*w));
    const y2=Math.min(h,Math.floor((r.y+r.h)*h));
    for(let y=y1;y<y2;y++){
      for(let x=x1;x<x2;x++){
        const i=(y*w+x)*4;
        // Scanlines
        if(y%3===0&&crtParams.scanlines>0){
          d[i]*=(1-crtParams.scanlines*0.5);d[i+1]*=(1-crtParams.scanlines*0.5);d[i+2]*=(1-crtParams.scanlines*0.5);
        }
        // Chromatic aberration
        if(chr>0){
          const ri=Math.min((y*w+x+chr)*4,d.length-4);
          const bi=Math.max((y*w+x-chr)*4,0);
          d[i]=d[ri];d[i+2]=d[bi];
        }
        // Noise
        if(Math.random()<0.05*intensity){
          const n=(Math.random()-0.5)*50*intensity;
          d[i]+=n;d[i+1]+=n;d[i+2]+=n;
        }
        // Green tint
        d[i+1]=Math.min(255,d[i+1]*1.1);
      }
    }
  });
  return imageData;
}

function drawFrame(){
  if(video.readyState>=2){
    ctx.save();ctx.translate(W,0);ctx.scale(-1,1);
    ctx.drawImage(video,0,0,W,H);ctx.restore();
    if((faceRegions.length>0||handRegions.length>0)&&crtParams.intensity>0){
      const allRegions=[...faceRegions,...handRegions];
      const imgData=ctx.getImageData(0,0,W,H);
      applyCRTToRegion(imgData,allRegions,crtParams.intensity);
      ctx.putImageData(imgData,0,0);
      // Draw region borders
      ctx.strokeStyle='rgba(0,255,65,0.3)';ctx.lineWidth=1;
      allRegions.forEach(r=>{
        ctx.strokeRect(r.x*W,r.y*H,r.w*W,r.h*H);
      });
    }
  }
  // 3D model
  if(palmOpen){
    heritageModel.visible=true;
    const tx=(0.5-palmPos.x)*6;const ty=(0.5-palmPos.y)*4;
    heritageModel.position.x+=(tx-heritageModel.position.x)*0.1;
    heritageModel.position.y+=(ty-heritageModel.position.y)*0.1;
    heritageModel.rotation.y+=0.01;
    if(!modelVisible){modelVisible=true;document.getElementById('modelDot').className='status-dot on';
      document.getElementById('modelInfo').textContent='🏛️ 국가유산 3D 모델 활성화';
      document.getElementById('modelInfo').classList.add('show');}
  }else{
    if(heritageModel.visible){
      heritageModel.visible=false;modelVisible=false;
      document.getElementById('modelDot').className='status-dot off';
      document.getElementById('modelInfo').classList.remove('show');
    }
  }
  renderer.render(scene,camera3d);
  requestAnimationFrame(drawFrame);
}

// ===== Face + Hand Detection =====
function isPalmOpen(landmarks){
  const tips=[8,12,16,20];const pips=[6,10,14,18];
  let extended=0;
  tips.forEach((t,i)=>{if(landmarks[t].y<landmarks[pips[i]].y)extended++;});
  return extended>=4;
}

async function init(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:1280,height:720}});
    video.srcObject=stream;await video.play();
    // Face Mesh
    const faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({maxNumFaces:2,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    faceMesh.onResults(fr=>{
      if(fr.multiFaceLandmarks&&fr.multiFaceLandmarks.length>0){
        document.getElementById('faceDot').className='status-dot on';
        faceRegions=fr.multiFaceLandmarks.map(lms=>{
          let minX=1,minY=1,maxX=0,maxY=0;
          lms.forEach(l=>{minX=Math.min(minX,l.x);minY=Math.min(minY,l.y);maxX=Math.max(maxX,l.x);maxY=Math.max(maxY,l.y);});
          const pad=0.05;return{x:minX-pad,y:minY-pad,w:maxX-minX+pad*2,h:maxY-minY+pad*2};
        });
      }else{faceRegions=[];document.getElementById('faceDot').className='status-dot off';}
    });
    // Hands
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.5});
    hands.onResults(hr=>{
      if(hr.multiHandLandmarks&&hr.multiHandLandmarks.length>0){
        document.getElementById('handDot').className='status-dot on';
        handRegions=hr.multiHandLandmarks.map(lms=>{
          let minX=1,minY=1,maxX=0,maxY=0;
          lms.forEach(l=>{minX=Math.min(minX,l.x);minY=Math.min(minY,l.y);maxX=Math.max(maxX,l.x);maxY=Math.max(maxY,l.y);});
          const pad=0.05;return{x:minX-pad,y:minY-pad,w:maxX-minX+pad*2,h:maxY-minY+pad*2};
        });
        const lm=hr.multiHandLandmarks[0];
        palmOpen=isPalmOpen(lm);
        palmPos={x:lm[9].x,y:lm[9].y};
      }else{handRegions=[];palmOpen=false;document.getElementById('handDot').className='status-dot off';}
    });
    // Camera loop - alternate between face and hand detection
    let frameCount=0;
    const cam=new Camera(video,{
      onFrame:async()=>{
        if(frameCount%2===0)await faceMesh.send({image:video});
        else await hands.send({image:video});
        frameCount++;
      },width:1280,height:720
    });
    cam.start();
  }catch(e){console.error('Init error:',e)}
  drawFrame();
}
init();
</script>
</body>
</html>
